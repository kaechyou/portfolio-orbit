<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#05080f"/>
  <!-- outer glow ring -->
  <circle cx="90" cy="90" r="52" stroke="url(#orbitGrad)" stroke-width="3" opacity="0.5"/>
  <!-- orbit ellipse -->
  <ellipse cx="90" cy="90" rx="62" ry="28" transform="rotate(-30 90 90)" stroke="url(#orbitGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- core sphere -->
  <circle cx="90" cy="90" r="22" fill="url(#coreGrad)"/>
  <!-- highlight -->
  <circle cx="82" cy="82" r="8" fill="white" opacity="0.25"/>
  <!-- orbiting dot -->
  <circle cx="138" cy="62" r="7" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <linearGradient id="orbitGrad" x1="28" y1="28" x2="152" y2="152">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#6b7fa3"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#4de8ff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </radialGradient>
  </defs>
</svg>
